name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/pr-labeler.yml
          sync-labels: false
          repo-token: ${{ github.token }}
